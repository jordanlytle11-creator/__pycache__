databases:
  - name: local-erp-db
    databaseName: local_erp
    user: local_erp_user

services:
  - type: web
    name: local-erp
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LOCAL_ERP_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: local-erp-db
          property: connectionString
      - key: LOCAL_ERP_ADMIN_EMAIL
        value: admin@localerp.com
